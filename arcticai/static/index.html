<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcticAI</title>
    <style>
      :root { color-scheme: light dark; --accent: rgba(70,140,255,.8); --accent-bg: rgba(70,140,255,.15); --border: rgba(128,128,128,.3); --bg-subtle: rgba(128,128,128,.06); }
      * { box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 0; }

      /* Header */
      .header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
      .header h1 { margin: 0; font-size: 18px; font-weight: 700; white-space: nowrap; }
      .tabs { display: flex; gap: 2px; background: var(--bg-subtle); border-radius: 8px; padding: 2px; }
      .tab { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; opacity: 0.7; }
      .tab.active { background: var(--accent-bg); opacity: 1; color: var(--accent); }
      .tab:hover { opacity: 1; }

      /* Main */
      .main { padding: 16px 20px; max-width: 1100px; }
      .panel { display: none; }
      .panel.active { display: block; }

      /* Forms */
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
      .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
      .form-grid .span-2 { grid-column: span 2; }
      .form-grid .span-3 { grid-column: span 3; }
      @media (max-width: 700px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } .form-grid .span-2, .form-grid .span-3 { grid-column: span 1; } }
      label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; margin-bottom: 3px; }
      input, textarea, select { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-size: 13px; font-family: inherit; }
      textarea { min-height: 80px; resize: vertical; }
      input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

      /* Buttons */
      button { padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-subtle); cursor: pointer; font-size: 13px; font-family: inherit; }
      button:hover { background: rgba(128,128,128,.15); }
      button:disabled { opacity: 0.4; cursor: default; }
      button.primary { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 600; }
      button.primary:hover { background: rgba(70,140,255,.25); }
      button.sm { padding: 3px 8px; font-size: 11px; }
      button.danger { border-color: rgba(255,80,80,.5); color: rgba(255,80,80,.9); }
      button.danger:hover { background: rgba(255,80,80,.12); }
      button.success { border-color: rgba(50,180,80,.5); color: rgba(50,180,80,.9); }
      button.success:hover { background: rgba(50,180,80,.12); }
      .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }

      /* Status badges */
      .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.3px; }
      .badge-pending { background: rgba(255,180,0,.15); color: rgba(200,140,0,1); }
      .badge-approved { background: rgba(50,180,80,.15); color: rgba(40,150,60,1); }
      .badge-sent { background: rgba(70,140,255,.15); color: rgba(60,120,220,1); }
      .badge-rejected { background: rgba(255,80,80,.12); color: rgba(220,60,60,1); }
      .badge-failed { background: rgba(255,80,80,.12); color: rgba(220,60,60,1); }

      /* Tables */
      .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
      .tbl th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.5; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 600; }
      .tbl td { padding: 8px 8px; border-bottom: 1px solid var(--bg-subtle); vertical-align: top; }
      .tbl tr:hover td { background: var(--bg-subtle); }
      .tbl tr.clickable { cursor: pointer; }

      /* Cards */
      .card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
      .card.selectable { cursor: pointer; }
      .card.selectable:hover, .card.selected { border-color: var(--accent); background: var(--accent-bg); }

      /* Sections */
      .section { margin-bottom: 20px; }
      .section-title { font-size: 13px; font-weight: 700; margin: 0 0 8px 0; display: flex; align-items: center; gap: 8px; }
      .section-title .count { font-weight: 400; opacity: 0.5; }
      .muted { font-size: 12px; opacity: 0.6; }
      .mono { font-family: ui-monospace, "Cascadia Code", "Fira Code", Menlo, monospace; font-size: 12px; }

      /* Spinner */
      .spinner { display: none; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; opacity: 0.7; }
      .spinner.active { display: flex; }
      .spin-ring { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Toast */
      .toast-container { position: fixed; top: 12px; right: 12px; z-index: 999; display: flex; flex-direction: column; gap: 6px; }
      .toast { padding: 8px 14px; border-radius: 6px; font-size: 13px; animation: toast-in .2s ease; max-width: 360px; word-break: break-word; }
      .toast-ok { background: rgba(50,180,80,.15); border: 1px solid rgba(50,180,80,.4); }
      .toast-err { background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.4); }
      @keyframes toast-in { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

      /* Expand row */
      .expand-body { padding: 8px 8px 8px 28px; border-bottom: 1px solid var(--border); background: var(--bg-subtle); white-space: pre-wrap; font-size: 12px; font-family: inherit; display: none; }
      .expand-body.open { display: table-row; }

      /* Contact list in search results */
      .contact-row { font-size: 12px; padding: 2px 0; display: flex; gap: 6px; align-items: center; }
      .contact-email { font-family: ui-monospace, monospace; }
      .contact-role { opacity: 0.6; font-style: italic; }

      /* Filter bar */
      .filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
      .filter-bar select, .filter-bar input { width: auto; padding: 3px; }
      .filter-bar select { background: #fff; color: #000; }
      

      /* Collapsible */
      .collapsible-toggle { cursor: pointer; user-select: none; }
      .collapsible-body { overflow: hidden; max-height: 0; transition: max-height .2s ease; }
      .collapsible-body.open { max-height: 2000px; }

      /* Empty state */
      .empty { text-align: center; padding: 24px; opacity: 0.5; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="toast-container" id="toasts"></div>

    <div class="header">
      <h1>ArcticAI</h1>
      <div class="tabs">
        <button class="tab active" data-tab="search">Search</button>
        <button class="tab" data-tab="outreach">Outreach</button>
        <button class="tab" data-tab="companies">Companies</button>
      </div>
    </div>

    <div class="main">

      <!-- ═══════ SEARCH TAB ═══════ -->
      <div class="panel active" id="panel-search">
        <div class="section">
          <div class="form-grid">
            <div>
              <label>Location</label>
              <input id="s-location" value="Leesburg, VA" />
            </div>
            <div>
              <label>Field</label>
              <input id="s-field" value="cybersecurity" />
            </div>
            <div class="span-2">
              <label>Experience</label>
              <textarea id="s-experience" rows="2">Built vulnerability scanner using Flask and ML</textarea>
            </div>
            <div>
              <label>Target roles (comma-separated)</label>
              <input id="s-roles" value="intern,junior" />
            </div>
            <div>
              <label>&nbsp;</label>
              <div class="btn-row" style="margin-top:0;">
                <button class="primary" id="btnRunSearch">Run Search</button>
                <button id="btnClearResults">Clear</button>
              </div>
            </div>
          </div>
          <div class="spinner" id="searchSpinner">
            <div class="spin-ring"></div>
            <span>Searching for companies&hellip; this may take a minute</span>
          </div>
        </div>

        <div id="searchResults"></div>
      </div>

      <!-- ═══════ OUTREACH TAB ═══════ -->
      <div class="panel" id="panel-outreach">

        <!-- Outreach list -->
        <div class="section">
          <div class="section-title">
            Outreach Records <span class="count" id="outreachCount"></span>
          </div>
          <div class="filter-bar">
            <label style="margin:0;">User ID</label>
            <input id="o-filterUserId" type="number" value="1" style="width:70px;" />
            <label style="margin:0;">Status</label>
            <select id="o-filterStatus">
              <option value="">All</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="sent">Sent</option>
              <option value="rejected">Rejected</option>
              <option value="failed">Failed</option>
            </select>
            <button id="btnRefreshOutreach" class="sm">Refresh</button>
          </div>
          <div id="outreachList"></div>
        </div>
      </div>

       <!-- New draft form (collapsible) -->
        <div class="section">
          <div class="section-title collapsible-toggle" id="toggleDraftForm" data-label="New Draft">+ New Draft</div>
          <div class="collapsible-body" id="draftFormBody">
            <div class="form-grid" style="margin-top:6px;">
              <div>
                <label>User ID</label>
                <input id="o-userId" type="number" value="1" />
              </div>
              <div>
                <label>Company name</label>
                <input id="o-companyName" />
              </div>
              <div>
                <label>Company website</label>
                <input id="o-companyWebsite" placeholder="https://..." />
              </div>
              <div>
                <label>Recipient email</label>
                <input id="o-toEmail" type="email" />
              </div>
              <div class="span-2">
                <label>Subject</label>
                <input id="o-subject" />
              </div>
              <div class="span-2">
                <label>Body</label>
                <textarea id="o-body" rows="5"></textarea>
              </div>
            </div>
            <div class="btn-row">
              <button class="primary" id="btnCreateDraft">Create Draft</button>
              <button id="btnClearDraft">Clear Form</button>
            </div>
          </div>
        </div>

      <!-- ═══════ COMPANIES TAB ═══════ -->
      <div class="panel" id="panel-companies">
        <div class="section">
          <div class="section-title">
            Saved Companies <span class="count" id="companyCount"></span>
            <button class="sm" id="btnRefreshCompanies" style="margin-left:auto;">Refresh</button>
          </div>
          <div id="companyList"></div>
        </div>

        <div class="section">
          <div class="section-title collapsible-toggle" id="toggleCompanyForm">
            + Add Company
          </div>
          <div class="collapsible-body" id="companyFormBody">
            <div class="form-grid cols-3" style="margin-top:6px;">
              <div>
                <label>Name</label>
                <input id="c-name" />
              </div>
              <div>
                <label>Website</label>
                <input id="c-website" placeholder="https://..." />
              </div>
              <div>
                <label>Location</label>
                <input id="c-location" />
              </div>
              <div>
                <label>Field</label>
                <input id="c-field" />
              </div>
              <div class="span-2">
                <label>About</label>
                <input id="c-about" />
              </div>
            </div>
            <div class="btn-row">
              <button class="primary" id="btnAddCompany">Add Company</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <script>
      const BASE = `${location.protocol}//${location.host}`;

      // ── Helpers ──

      async function api(path, opts = {}) {
        try {
          const res = await fetch(`${BASE}${path}`, opts);
          const text = await res.text();
          let data = null;
          try { data = JSON.parse(text); } catch { data = text; }
          return { ok: res.ok, status: res.status, data };
        } catch (e) {
          return { ok: false, status: 0, data: e.message };
        }
      }

      function postJson(path, body) {
        return api(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      }

      function toast(msg, ok = true) {
        const el = document.createElement("div");
        el.className = `toast ${ok ? "toast-ok" : "toast-err"}`;
        el.textContent = msg;
        document.getElementById("toasts").appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }

      function badge(status) {
        const cls = {
          pending: "badge-pending", approved: "badge-approved",
          sent: "badge-sent", rejected: "badge-rejected", failed: "badge-failed"
        }[status] || "badge-pending";
        return `<span class="badge ${cls}">${status}</span>`;
      }

      function esc(s) {
        if (!s) return "";
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // ── Tabs ──

      document.querySelectorAll(".tab").forEach(t => {
        t.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
          document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
          t.classList.add("active");
          document.getElementById(`panel-${t.dataset.tab}`).classList.add("active");
          // auto-load data
          if (t.dataset.tab === "outreach") loadOutreach();
          if (t.dataset.tab === "companies") loadCompanies();
        });
      });

      // ── Collapsibles ──

      document.querySelectorAll(".collapsible-toggle").forEach(el => {
        const label = el.textContent.trim().replace(/^[+-]\s*/, "").trim();
        el.addEventListener("click", () => {
          const body = el.nextElementSibling;
          const open = body.classList.toggle("open");
          el.textContent = (open ? "- " : "+ ") + label;
        });
      });

      // ═══════ SEARCH ═══════

      let lastSearchData = null;

      document.getElementById("btnRunSearch").onclick = async () => {
        const btn = document.getElementById("btnRunSearch");
        const spinner = document.getElementById("searchSpinner");
        btn.disabled = true;
        spinner.classList.add("active");
        document.getElementById("searchResults").innerHTML = "";

        const body = {
          location: document.getElementById("s-location").value,
          field: document.getElementById("s-field").value,
          experience: document.getElementById("s-experience").value,
          target_roles: document.getElementById("s-roles").value.split(",").map(s => s.trim()).filter(Boolean),
        };

        const r = await postJson("/search", body);
        spinner.classList.remove("active");
        btn.disabled = false;

        if (!r.ok) {
          toast(`Search failed: ${typeof r.data === "string" ? r.data : r.data?.detail || r.status}`, false);
          return;
        }

        lastSearchData = r.data;
        renderSearchResults(r.data);
      };

      document.getElementById("btnClearResults").onclick = () => {
        document.getElementById("searchResults").innerHTML = "";
        lastSearchData = null;
      };

      function renderSearchResults(data) {
        const container = document.getElementById("searchResults");
        container.innerHTML = "";

        const items = data?.items || [];
        if (!items.length) {
          container.innerHTML = '<div class="empty">No companies found. Try a different location or field.</div>';
          return;
        }

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerHTML = `Results <span class="count">(${items.length} companies)</span>`;
        container.appendChild(title);

        items.forEach((item, idx) => {
          const company = item.company || {};
          const contacts = item.contacts || [];
          const draft = item.draft || {};

          const card = document.createElement("div");
          card.className = "card";

          // Company header
          let html = `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">`;
          html += `<div>`;
          html += `<strong>${esc(company.name || "Unnamed")}</strong>`;
          if (company.website) html += `<div class="mono muted" style="margin-top:2px;">${esc(company.website)}</div>`;
          if (company.about) html += `<div class="muted" style="margin-top:2px;">${esc(company.about)}</div>`;
          if (company.keywords && company.keywords.length) {
            html += `<div class="muted" style="margin-top:4px;">${company.keywords.map(k => esc(k)).join(", ")}</div>`;
          }
          html += `</div>`;
          html += `<button class="sm primary" data-idx="${idx}" onclick="useDraft(${idx})">Use as Draft</button>`;
          html += `</div>`;

          // Contacts
          if (contacts.length) {
            html += `<div style="margin-top:8px;"><label style="margin:0;">Contacts (${contacts.length})</label>`;
            contacts.forEach(c => {
              html += `<div class="contact-row">`;
              html += `<span class="contact-email">${esc(c.email)}</span>`;
              if (c.role_guess) html += `<span class="contact-role">${esc(c.role_guess)}</span>`;
              html += `<button class="sm" onclick="useDraftWithEmail(${idx}, '${esc(c.email)}')">Use</button>`;
              html += `</div>`;
            });
            html += `</div>`;
          } else {
            html += `<div class="muted" style="margin-top:6px;">No contacts found</div>`;
          }

          // Draft preview
          if (draft.subject || draft.body) {
            html += `<details style="margin-top:8px;"><summary class="muted" style="cursor:pointer;">Preview generated email</summary>`;
            html += `<div style="margin-top:4px;padding:8px;border-radius:6px;background:var(--bg-subtle);font-size:12px;">`;
            html += `<div><strong>Subject:</strong> ${esc(draft.subject)}</div>`;
            html += `<div style="margin-top:4px;white-space:pre-wrap;">${esc(draft.body)}</div>`;
            html += `</div></details>`;
          }

          card.innerHTML = html;
          container.appendChild(card);
        });
      }

      window.useDraft = function(idx) {
        if (!lastSearchData?.items?.[idx]) return;
        const item = lastSearchData.items[idx];
        const company = item.company || {};
        const contacts = item.contacts || [];
        const draft = item.draft || {};

        let email = contacts[0]?.email || "";
        if (!email && company.website) {
          const host = company.website.replace(/^https?:\/\//, "").split("/")[0];
          email = `hiring@${host}`;
        }

        fillDraftForm(company.name, company.website, email, draft.subject, draft.body);
        switchToTab("outreach");
      };

      window.useDraftWithEmail = function(idx, email) {
        if (!lastSearchData?.items?.[idx]) return;
        const item = lastSearchData.items[idx];
        const company = item.company || {};
        const draft = item.draft || {};

        fillDraftForm(company.name, company.website, email, draft.subject, draft.body);
        switchToTab("outreach");
      };

      function fillDraftForm(name, website, email, subject, body) {
        document.getElementById("o-companyName").value = name || "";
        document.getElementById("o-companyWebsite").value = website || "";
        document.getElementById("o-toEmail").value = email || "";
        document.getElementById("o-subject").value = subject || "";
        document.getElementById("o-body").value = body || "";
        // open the form
        const formBody = document.getElementById("draftFormBody");
        if (!formBody.classList.contains("open")) {
          document.getElementById("toggleDraftForm").click();
        }
      }

      function switchToTab(tab) {
        document.querySelectorAll(".tab").forEach(t => {
          t.classList.toggle("active", t.dataset.tab === tab);
        });
        document.querySelectorAll(".panel").forEach(p => {
          p.classList.toggle("active", p.id === `panel-${tab}`);
        });
        if (tab === "outreach") loadOutreach();
        if (tab === "companies") loadCompanies();
      }

      // ═══════ OUTREACH ═══════

      document.getElementById("btnCreateDraft").onclick = async () => {
        const body = {
          user_id: Number(document.getElementById("o-userId").value),
          company_name: document.getElementById("o-companyName").value,
          company_website: document.getElementById("o-companyWebsite").value || null,
          to_email: document.getElementById("o-toEmail").value,
          subject: document.getElementById("o-subject").value,
          body: document.getElementById("o-body").value,
        };

        if (!body.company_name || !body.to_email || !body.subject) {
          toast("Fill in company name, email, and subject", false);
          return;
        }

        const r = await postJson("/outreach", body);
        if (r.ok) {
          toast(`Draft #${r.data.id} created`);
          loadOutreach();
          // collapse form
          const formBody = document.getElementById("draftFormBody");
          if (formBody.classList.contains("open")) {
            document.getElementById("toggleDraftForm").click();
          }
        } else {
          toast(`Failed: ${r.data?.detail || r.status}`, false);
        }
      };

      document.getElementById("btnClearDraft").onclick = () => {
        ["o-companyName","o-companyWebsite","o-toEmail","o-subject","o-body"].forEach(id => {
          document.getElementById(id).value = "";
        });
      };

      document.getElementById("btnRefreshOutreach").onclick = () => loadOutreach();

      async function loadOutreach() {
        const userId = Number(document.getElementById("o-filterUserId").value);
        const statusFilter = document.getElementById("o-filterStatus").value;
        const container = document.getElementById("outreachList");

        const r = await api(`/outreach?user_id=${encodeURIComponent(userId)}`);
        if (!r.ok) {
          container.innerHTML = `<div class="empty">Failed to load outreach records</div>`;
          return;
        }

        let items = r.data?.items || [];
        if (statusFilter) {
          items = items.filter(o => o.status === statusFilter);
        }

        document.getElementById("outreachCount").textContent = `(${items.length})`;

        if (!items.length) {
          container.innerHTML = '<div class="empty">No outreach records found</div>';
          return;
        }

        let html = `<table class="tbl"><thead><tr>
          <th>ID</th><th>Email</th><th>Subject</th><th>Status</th><th>Actions</th>
        </tr></thead><tbody>`;

        items.forEach(o => {
          html += `<tr class="clickable" data-oid="${o.id}">`;
          html += `<td class="mono">${o.id}</td>`;
          html += `<td class="mono">${esc(o.email)}</td>`;
          html += `<td>${esc(o.message_subject)}</td>`;
          html += `<td>${badge(o.status)}</td>`;
          html += `<td class="btn-row" style="margin:0;">`;

          if (o.status === "pending") {
            html += `<button class="sm success" onclick="event.stopPropagation();outreachAction(${o.id},'approve')">Approve</button>`;
            html += `<button class="sm danger" onclick="event.stopPropagation();outreachAction(${o.id},'reject')">Reject</button>`;
          }
          if (o.status === "approved") {
            html += `<button class="sm primary" onclick="event.stopPropagation();outreachAction(${o.id},'send')">Send</button>`;
            html += `<button class="sm danger" onclick="event.stopPropagation();outreachAction(${o.id},'reject')">Reject</button>`;
          }
          if (o.status !== "sent") {
            html += `<button class="sm" onclick="event.stopPropagation();toggleEdit(${o.id})">Edit</button>`;
          }

          html += `</td></tr>`;

          // Expandable body row (read-only view + edit form)
          html += `<tr class="expand-row" id="expand-${o.id}" style="display:none;">`;
          html += `<td colspan="5" style="padding:8px 8px 8px 28px;background:var(--bg-subtle);font-size:12px;">`;
          html += `<div id="view-${o.id}" style="white-space:pre-wrap;">`;
          html += `<strong>To:</strong> ${esc(o.email)}\n<strong>Subject:</strong> ${esc(o.message_subject)}\n\n${esc(o.message_body)}`;
          html += `</div>`;
          if (o.status !== "sent") {
            html += `<div id="editForm-${o.id}" style="display:none;margin-top:8px;">`;
            html += `<div style="display:grid;gap:6px;">`;
            html += `<div><label>To Email</label><input id="edit-email-${o.id}" value="${esc(o.email)}" /></div>`;
            html += `<div><label>Subject</label><input id="edit-subject-${o.id}" value="${esc(o.message_subject)}" /></div>`;
            html += `<div><label>Body</label><textarea id="edit-body-${o.id}" rows="6" style="min-height:120px;">${esc(o.message_body)}</textarea></div>`;
            html += `</div>`;
            html += `<div class="btn-row" style="margin-top:6px;">`;
            html += `<button class="sm primary" onclick="saveEdit(${o.id})">Save</button>`;
            html += `<button class="sm" onclick="cancelEdit(${o.id})">Cancel</button>`;
            html += `</div></div>`;
          }
          html += `</td></tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;

        // Click to expand
        container.querySelectorAll("tr.clickable").forEach(tr => {
          tr.addEventListener("click", () => {
            const oid = tr.dataset.oid;
            const expandRow = document.getElementById(`expand-${oid}`);
            const visible = expandRow.style.display !== "none";
            expandRow.style.display = visible ? "none" : "table-row";
          });
        });
      }

      window.outreachAction = async function(id, action) {
        const r = await api(`/outreach/${id}/${action}`, { method: "POST" });
        if (r.ok) {
          const label = action.charAt(0).toUpperCase() + action.slice(1);
          toast(`${label}: outreach #${id}`);
          loadOutreach();
        } else {
          toast(`${action} failed: ${r.data?.detail || r.status}`, false);
        }
      };

      window.toggleEdit = function(id) {
        const expandRow = document.getElementById(`expand-${id}`);
        const editForm = document.getElementById(`editForm-${id}`);
        const viewDiv = document.getElementById(`view-${id}`);
        if (!editForm) return;
        const isEditing = editForm.style.display !== "none";
        if (isEditing) {
          editForm.style.display = "none";
          viewDiv.style.display = "";
        } else {
          expandRow.style.display = "table-row";
          viewDiv.style.display = "none";
          editForm.style.display = "";
        }
      };

      window.cancelEdit = function(id) {
        const editForm = document.getElementById(`editForm-${id}`);
        const viewDiv = document.getElementById(`view-${id}`);
        editForm.style.display = "none";
        viewDiv.style.display = "";
      };

      window.saveEdit = async function(id) {
        const email = document.getElementById(`edit-email-${id}`).value.trim();
        const subject = document.getElementById(`edit-subject-${id}`).value.trim();
        const body = document.getElementById(`edit-body-${id}`).value;
        if (!email || !subject) { toast("Email and subject are required", false); return; }
        const r = await api(`/outreach/${id}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to_email: email, subject, body }),
        });
        if (r.ok) {
          toast(`Draft #${id} updated`);
          loadOutreach();
        } else {
          toast(`Save failed: ${r.data?.detail || r.status}`, false);
        }
      };

      document.getElementById("o-filterStatus").onchange = () => loadOutreach();
      document.getElementById("o-filterUserId").onchange = () => loadOutreach();

      // ═══════ COMPANIES ═══════

      async function loadCompanies() {
        const container = document.getElementById("companyList");
        const r = await api("/companies");
        if (!r.ok) {
          container.innerHTML = '<div class="empty">Failed to load companies</div>';
          return;
        }

        const items = r.data || [];
        document.getElementById("companyCount").textContent = `(${items.length})`;

        if (!items.length) {
          container.innerHTML = '<div class="empty">No companies saved yet. Run a search or add one manually.</div>';
          return;
        }

        let html = `<table class="tbl"><thead><tr>
          <th>ID</th><th>Name</th><th>Website</th><th>Location</th><th>Field</th>
        </tr></thead><tbody>`;

        items.forEach(c => {
          html += `<tr>`;
          html += `<td class="mono">${c.id}</td>`;
          html += `<td>${esc(c.name)}</td>`;
          html += `<td class="mono">${esc(c.website || "—")}</td>`;
          html += `<td>${esc(c.location || "—")}</td>`;
          html += `<td>${esc(c.field || "—")}</td>`;
          html += `</tr>`;
          if (c.about) {
            html += `<tr><td></td><td colspan="4" class="muted">${esc(c.about)}</td></tr>`;
          }
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      document.getElementById("btnRefreshCompanies").onclick = () => loadCompanies();

      document.getElementById("btnAddCompany").onclick = async () => {
        const body = {
          name: document.getElementById("c-name").value,
          website: document.getElementById("c-website").value || null,
          location: document.getElementById("c-location").value || null,
          field: document.getElementById("c-field").value || null,
          about: document.getElementById("c-about").value || null,
        };

        if (!body.name) { toast("Company name is required", false); return; }

        const r = await postJson("/companies", body);
        if (r.ok) {
          toast(`Company "${body.name}" added`);
          loadCompanies();
          ["c-name","c-website","c-location","c-field","c-about"].forEach(id => document.getElementById(id).value = "");
        } else {
          toast(`Failed: ${r.data?.detail || r.status}`, false);
        }
      };
    </script>
  </body>
</html>
